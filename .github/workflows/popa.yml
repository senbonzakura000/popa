name: Update PopAds Library
on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:
permissions:
  contents: write
jobs:
  update-library:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Fetch, extract, and commit PopAds libraries
        env:
          POPADS_API_KEY: ${{ secrets.POPADS_API_KEY }}
        run: |
          # filename:website_id
          POPA_SITES=(
            "popa_corner_st:5312775"
            "popa_corner_foo:5312062"
            "popa_corner_cloud:5312064"
            "popa_corner_fun:5312067"

            "popa_ninja_cloud:5313363"
            "popa_ninja_fun:5313366"

            "popa_data_roxie:5313360"

            "popa_getsu_sportsembed:5299831"
            "popa_getsu_play2:5299815"
            "popa_getsu_topembed:5299834"
            "popa_getsu_amazon:5313190"

            "popa_pande_amazon:5313192"
          )
          for entry in "${POPA_SITES[@]}"; do
            filename="${entry%%:*}"
            website_id="${entry##*:}"
            [ -z "$website_id" ] && continue
            url="https://www.popads.net/api/website_code?key=${POPADS_API_KEY}&website_id=${website_id}&tl=auto&aab=1&of=1"
            echo "Processing $filename (website_id=$website_id) → ${filename}.js"
            curl -f -o "${filename}_raw.js" "$url"
            perl -0777 -ne 'print $1 if /<script[^>]*>(.*?)<\/script>/s' "${filename}_raw.js" > "${filename}.js"
          done
          rm -f *_raw.js
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add popa_*.js
          git diff --staged --quiet || git commit -m "Update PopAds library"
          git push
